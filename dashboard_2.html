<html lang="en">
<head>
<meta charset="UTF-8">

<title>Psych Congress — Email Copy Library 2026</title>
<style>
:root{
  --blue:#00589a;--dark-blue:#004681;--orange:#faa73f;--slate:#30485f;
  --green:#16a34a;--red:#dc2626;--yellow:#d97706;--bg:#f0f4f8;--radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--slate);font-size:13px;}

header{background:linear-gradient(135deg,var(--dark-blue),var(--blue));color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;box-shadow:0 2px 8px rgba(0,0,0,.2);}
header h1{font-size:17px;font-weight:700;}
header .meta{font-size:11px;opacity:.8;}

.controls{background:#fff;border-bottom:2px solid #e2e8f0;padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.fb{padding:5px 12px;border-radius:20px;border:1.5px solid #cbd5e1;background:#fff;font-size:11px;font-weight:600;cursor:pointer;color:var(--slate);transition:all .15s;}
.fb:hover,.fb.on{background:var(--slate);color:#fff;border-color:var(--slate);}
.fb.uspc.on{background:#1e40af;border-color:#1e40af;}
.fb.pcr.on{background:#9d174d;border-color:#9d174d;}
.fb.elevate.on{background:#6b21a8;border-color:#6b21a8;}
.fb.npi.on{background:#92400e;border-color:#92400e;}
.fb.pai.on{background:#0369a1;border-color:#0369a1;}
select{padding:5px 10px;border:1.5px solid #cbd5e1;border-radius:var(--radius);font-size:11px;color:var(--slate);}
input[type=text]{padding:6px 11px;border:1.5px solid #cbd5e1;border-radius:var(--radius);font-size:12px;width:200px;outline:none;}
input[type=text]:focus{border-color:var(--blue);}
#emailCount{font-size:11px;color:#94a3b8;margin-left:auto;}

.main{padding:20px 24px 48px;}

.sh{font-size:14px;font-weight:700;color:var(--slate);margin:20px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--orange);}

/* EMAIL CARD */
.ec{background:#fff;border-radius:var(--radius);border:1px solid #e2e8f0;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);}
.ec-hdr{padding:12px 16px;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:6px;cursor:pointer;border-bottom:1px solid #f1f5f9;}
.ec-hdr:hover{background:#fafafa;}
.ec-date{font-size:10px;font-weight:700;color:#94a3b8;margin-bottom:3px;}
.ec-name{font-size:13px;font-weight:700;color:var(--slate);}
.ec-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px;}
.pill{display:inline-block;padding:2px 7px;border-radius:12px;font-size:10px;font-weight:700;}
.arrow{font-size:11px;color:#94a3b8;flex-shrink:0;margin-top:2px;}

.ec-body{display:none;padding:16px;border-top:1px solid #f1f5f9;}
.ec-body.open{display:block;}

.field-label{font-size:10px;font-weight:700;text-transform:uppercase;color:#94a3b8;margin-bottom:4px;margin-top:12px;letter-spacing:.5px;}
.field-label:first-child{margin-top:0;}
.subj{display:flex;gap:8px;margin-bottom:4px;}
.subj-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:4px;flex-shrink:0;}
.subj-a{background:#dbeafe;color:#1e40af;}
.subj-b{background:#f3e8ff;color:#6b21a8;}
.preview-box{font-style:italic;font-size:12px;color:#374151;background:#f8fafc;padding:7px 10px;border-radius:6px;margin-bottom:2px;}
.copy-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:12px 14px;font-size:12px;line-height:1.8;color:#1f2937;white-space:pre-wrap;font-family:'Segoe UI',Arial,sans-serif;}
.from-box{font-size:12px;color:#374151;background:#f1f5f9;padding:6px 10px;border-radius:6px;}
.cta-box{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:6px;padding:8px 12px;font-size:12px;font-weight:700;color:var(--blue);}
.note-box{background:#fef9f0;border-left:3px solid var(--orange);padding:8px 12px;border-radius:0 6px 6px 0;font-size:11px;line-height:1.65;color:#374151;}

.alert{padding:10px 14px;border-radius:var(--radius);margin-bottom:14px;font-size:12px;line-height:1.6;}
.alert.info{background:#dbeafe;border-left:4px solid var(--blue);color:#1e40af;}
.alert.warn{background:#fef3c7;border-left:4px solid var(--yellow);color:#92400e;}

.month-header{background:var(--slate);color:#fff;padding:10px 16px;border-radius:var(--radius);margin:20px 0 12px;font-size:13px;font-weight:700;}

.hidden{display:none;}
</style>

// ─────────────────────────────────────────────────────────────
// RENDER ENGINE
// ─────────────────────────────────────────────────────────────
let activeBrand = 'ALL';
let activeSeg = 'ALL';
let activeSearch = '';

const BRAND_COLORS = {
  USPC:{c:'#1e40af',bg:'#dbeafe',label:'Psych Congress'},
  PCR:{c:'#9d174d',bg:'#fce7f3',label:'PC Regionals'},
  ELEVATE:{c:'#6b21a8',bg:'#f3e8ff',label:'Elevate'},
  NPI:{c:'#92400e',bg:'#fef3c7',label:'NP Institute'},
  PAI:{c:'#0369a1',bg:'#e0f2fe',label:'PA Institute'},
};

const SEG_COLORS = {
  TOFU:{bg:'#fee2e2',c:'#991b1b'}, MOFU:{bg:'#fef3c7',c:'#92400e'},
  BOFU:{bg:'#dcfce7',c:'#166534'}, Registrants:{bg:'#dbeafe',c:'#1e40af'},
  Alumni:{bg:'#f3e8ff',c:'#6b21a8'}, Prospects:{bg:'#f1f5f9',c:'#334155'},
  Local:{bg:'#e0f2fe',c:'#0369a1'}, All:{bg:'#f8fafc',c:'#64748b'},
  Pendings:{bg:'#fef9c3',c:'#854d0e'}, Attendees:{bg:'#f0fdf4',c:'#047857'},
  'No Shows':{bg:'#fff7ed',c:'#c2410c'},
};

function getSegs(seg) {
  return seg.split(',').map(s => s.trim());
}

function pill(text, colors) {
  const co = colors || {bg:'#f1f5f9',c:'#64748b'};
  return `<span class="pill" style="background:${co.bg};color:${co.c};">${text}</span>`;
}

function renderEmails() {
  const list = document.getElementById('emailList');
  const count = document.getElementById('emailCount');

  const filtered = EMAILS.filter(e => {
    if (activeBrand !== 'ALL' && e.brand !== activeBrand) return false;
    if (activeSeg !== 'ALL') {
      const segs = getSegs(e.seg);
      if (!segs.some(s => s.toLowerCase().includes(activeSeg.toLowerCase()) || activeSeg.toLowerCase().includes(s.toLowerCase()))) return false;
    }
    if (activeSearch) {
      const q = activeSearch.toLowerCase();
      if (!e.name.toLowerCase().includes(q) && !e.subjA.toLowerCase().includes(q) &&
          !(e.body||'').toLowerCase().includes(q)) return false;
    }
    return true;
  });

  count.textContent = `${filtered.length} of ${EMAILS.length} emails`;

  // Group by month
  const months = {};
  filtered.forEach(e => {
    const d = new Date(e.date);
    const key = d.toLocaleString('en-US',{month:'long',year:'numeric'});
    if (!months[key]) months[key] = [];
    months[key].push(e);
  });

  list.innerHTML = Object.entries(months).map(([month, emails]) => `
    <div class="month-header">${month} — ${emails.length} email${emails.length!==1?'s':''}</div>
    ${emails.map((e,i) => {
      const bc = BRAND_COLORS[e.brand] || {c:'#64748b',bg:'#f1f5f9',label:e.brand};
      const segs = getSegs(e.seg);
      const idx = EMAILS.indexOf(e);
      return `<div class="ec" data-brand="${e.brand}" data-seg="${e.seg}">
        <div class="ec-hdr" onclick="toggle(${idx})">
          <div style="flex:1;">
            <div class="ec-date">${e.date} · ${bc.label}</div>
            <div class="ec-name">${e.name}</div>
            <div class="ec-tags">
              ${pill(e.brand, bc)}
              ${segs.map(s => pill(s, SEG_COLORS[s.trim()]||{bg:'#f1f5f9',c:'#64748b'})).join('')}
            </div>
          </div>
          <div class="arrow" id="arrow-${idx}">▼</div>
        </div>
        <div class="ec-body" id="body-${idx}">
          <div class="field-label">Subject Lines (A/B Test)</div>
          <div class="subj"><span class="subj-tag subj-a">A</span><strong>${e.subjA}</strong></div>
          ${e.subjB ? `<div class="subj"><span class="subj-tag subj-b">B</span><span style="color:#6b21a8;font-weight:600;">${e.subjB}</span></div>` : ''}
          ${e.preview ? `<div class="field-label">Preview Text</div><div class="preview-box">${e.preview}</div>` : ''}
          <div class="field-label">From</div>
          <div class="from-box">${e.from}</div>
          <div class="field-label">Full Body Copy</div>
          <div class="copy-box">${e.body}</div>
          <div class="field-label">Primary CTA</div>
          <div class="cta-box">${e.cta}</div>
          ${e.note ? `<div class="field-label">Copy Notes</div><div class="note-box">${e.note}</div>` : ''}
        </div>
      </div>`;
    }).join('')}
  `).join('');
}

window.toggle = function(idx) {
  const body = document.getElementById(`body-${idx}`);
  const arrow = document.getElementById(`arrow-${idx}`);
  const open = body.classList.toggle('open');
  arrow.textContent = open ? '▲' : '▼';
};

window.filter = function(el, brand) {
  document.querySelectorAll('[data-brand]').forEach(b => b.classList.remove('on'));
  el.classList.add('on');
  activeBrand = brand;
  renderEmails();
};

window.filterSeg = function() {
  activeSeg = document.getElementById('segFilter').value;
  renderEmails();
};

window.search = function() {
  activeSearch = document.getElementById('search').value;
  renderEmails();
};

renderEmails();
</script>
</body>
</html>
