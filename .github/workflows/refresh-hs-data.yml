name: Refresh HubSpot Email Stats

on:
  schedule:
    - cron: '0 11 * * *'   # 6 AM ET daily (11:00 UTC)
  workflow_dispatch:         # also allows manual trigger from GitHub UI Actions tab

permissions:
  contents: write            # needed to commit email_stats.json back to the repo

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install axios
        run: npm install axios

      - name: Fetch HubSpot marketing email stats
        env:
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          node fetch-hs-stats.js

      - name: Commit and push updated stats
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add email_stats.json
          # Only commit if the file actually changed
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "chore: auto-update HubSpot email stats $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
